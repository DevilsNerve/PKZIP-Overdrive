name: Python tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: ${{ matrix.platform }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            runner: ubuntu-latest
            python-version: "3.10"
          - platform: Linux
            runner: ubuntu-latest
            python-version: "3.12"
          - platform: Linux
            runner: ubuntu-latest
            python-version: "3.14"
          - platform: Windows
            runner: windows-latest
            python-version: "3.10"
          - platform: Windows
            runner: windows-latest
            python-version: "3.14"
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile sources
        run: python -m compileall -q pkzip_overdrive.py wordlist_merger_gpu.py tests

      - name: Run regression suite
        run: python -m unittest discover -s tests -v

      - name: Run merger self-test
        run: python wordlist_merger_gpu.py --self-test

      - name: Verify official license fingerprint
        run: python -c "import hashlib, pathlib; actual = hashlib.sha256(pathlib.Path('LICENSE').read_bytes()).hexdigest(); assert actual == '0d96a4ff68ad6d4b6f1f30f713b18d5184912ba8dd389f86aa7710db079abcb0', actual"
