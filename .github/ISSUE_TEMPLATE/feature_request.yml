name: Feature request
description: Propose a focused improvement to an authorized recovery workflow
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the recovery or development problem without including sensitive data.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the user flow, CLI shape, or implementation contract you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This request is for archives and data the user owns or is explicitly authorized to recover.
          required: true
        - label: This request does not include an archive, hash, wordlist, recovered password, or other sensitive data.
          required: true
